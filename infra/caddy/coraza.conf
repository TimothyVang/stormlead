# coraza recommended config for stormlead
# tuned: paranoia level 1 (form fields with apostrophes / accents must pass)
# raise to 2 once we've seen real traffic

SecRuleEngine On
SecRequestBodyAccess On
SecRequestBodyLimit 13107200
SecRequestBodyNoFilesLimit 131072
SecResponseBodyAccess On
SecResponseBodyMimeType text/plain text/html text/xml application/json
SecResponseBodyLimit 524288

# tag every request so the bouncer can decide
SecAuditEngine RelevantOnly
SecAuditLogParts ABCEFHJKZ
SecAuditLogType Serial
SecAuditLog /dev/stdout

# stormlead-specific tuning:
# - allow longer free-text in damage description
# - allow common form fields (name, address, phone) with international chars
# - block obvious sql/xss patterns

SecAction "id:900110,phase:1,nolog,pass,t:none,setvar:tx.inbound_anomaly_score_threshold=10"
SecAction "id:900120,phase:1,nolog,pass,t:none,setvar:tx.outbound_anomaly_score_threshold=10"
SecAction "id:900200,phase:1,nolog,pass,t:none,setvar:tx.paranoia_level=1"

# whitelist our own webhook endpoints from the strictest rules
SecRule REQUEST_URI "@beginsWith /webhooks/" \
    "id:1001,phase:1,pass,nolog,ctl:ruleEngine=DetectionOnly"
