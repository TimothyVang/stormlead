name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  lint-and-type:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Install Python dependencies
        run: uv sync --all-extras --all-packages
      - name: Ruff
        run: uv run ruff check services libs scripts/smoke_e2e.py scripts/replay_lead.py scripts/simulate_v1_leads.py
      - name: Mypy
        run: uv run mypy services libs

  test-python:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb-ha:pg16-ts2.17
        env:
          POSTGRES_DB: stormlead_test
          POSTGRES_USER: stormlead
          POSTGRES_PASSWORD: stormlead
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg://stormlead:stormlead@localhost:5432/stormlead_test
      DATABASE_URL_HOST: postgresql+psycopg://stormlead:stormlead@localhost:5432/stormlead_test
      FORMBRICKS_WEBHOOK_SECRET: whsec_ci_placeholder
      NWS_USER_AGENT: stormlead-ci/0.1
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Install Python dependencies
        run: uv sync --all-extras --all-packages
      - name: Initialize database
        run: uv run python scripts/init_db.py
      - name: Run Alembic migrations
        working-directory: libs/stormlead_db
        run: uv run alembic upgrade head
      - name: Pytest
        run: uv run pytest -q services libs

  test-playwright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install Python dependencies
        run: uv sync --all-extras --all-packages
      - name: Install Node dependencies
        run: npm ci
      - name: Validate Compose config
        run: npm run validate:compose
      - name: MCP smoke
        run: npm run mcp:stormlead:smoke
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Start local synthetic stack
        env:
          STORMLEAD_LOCAL_AUTH_BYPASS: "true"
        run: >-
          docker compose --env-file .env.example -f infra/compose/dev/docker-compose.yml
          --profile pipeline up -d --build postgres rabbitmq hatchet-engine litellm
          form-receiver ping-post enrich-worker agent-runtime landing buyer-portal
      - name: Initialize database
        env:
          DATABASE_URL: postgresql+psycopg://stormlead:change-me-in-openbao@localhost:5433/stormlead
        run: uv run python scripts/init_db.py
      - name: Run Alembic migrations
        working-directory: libs/stormlead_db
        env:
          DATABASE_URL: postgresql+psycopg://stormlead:change-me-in-openbao@localhost:5433/stormlead
        run: uv run alembic upgrade head
      - name: Seed synthetic buyers
        env:
          DATABASE_URL: postgresql+psycopg://stormlead:change-me-in-openbao@localhost:5433/stormlead
        run: uv run python scripts/seed_dev.py
      - name: Local smoke
        run: uv run python scripts/smoke_e2e.py
      - name: V1 simulation
        run: uv run python scripts/simulate_v1_leads.py
      - name: Playwright
        run: xvfb-run -a npm run test:playwright -- --project=chromium --reporter=line
      - name: Compose status
        if: always()
        run: docker compose --env-file .env.example -f infra/compose/dev/docker-compose.yml ps
      - name: Service logs
        if: failure()
        run: >-
          docker compose --env-file .env.example -f infra/compose/dev/docker-compose.yml logs
          --no-color --tail=200 form-receiver ping-post enrich-worker agent-runtime landing buyer-portal

  build-images:
    runs-on: ubuntu-latest
    needs: [lint-and-type, test-python, test-playwright]
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service: [ping-post, form-receiver, storm-watcher, enrich-worker, agent-runtime]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: ghcr.io/stormlead/${{ matrix.service }}:${{ github.sha }}
