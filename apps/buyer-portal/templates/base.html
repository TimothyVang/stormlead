<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Buyer Portal{% endblock %}</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #030303;
        --glass: rgba(10, 10, 10, .7);
        --glass-strong: rgba(8, 8, 8, .82);
        --border: rgba(255, 255, 255, .1);
        --border-soft: rgba(255, 255, 255, .05);
        --text: #fff;
        --muted: #a3a3a3;
        --violet: #8b5cf6;
        --cyan: #06b6d4;
        --emerald: #10b981;
        --danger: #fb7185;
        --ease: cubic-bezier(.23, 1, .32, 1);
      }
      * { box-sizing: border-box; }
      html { background: var(--bg); scroll-behavior: smooth; }
      body {
        margin: 0;
        min-height: 100vh;
        overflow-x: hidden;
        background: radial-gradient(circle at top center, rgba(139, 92, 246, .4), transparent 34rem), radial-gradient(circle at left center, rgba(6, 182, 212, .08), transparent 42rem), #030303;
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body::before {
        background-image: linear-gradient(rgba(255,255,255,.032) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.032) 1px, transparent 1px);
        background-size: 72px 72px;
        content: "";
        inset: 0;
        mask-image: linear-gradient(to bottom, rgba(0,0,0,.76), transparent 78%);
        pointer-events: none;
        position: fixed;
      }
      .orb { border-radius: 999px; filter: blur(90px); opacity: .78; pointer-events: none; position: fixed; z-index: 0; animation: float-orb 12s var(--ease) infinite alternate; }
      .orb.violet { background: rgba(139, 92, 246, .4); height: 18rem; right: 7vw; top: 11vh; width: 18rem; }
      .orb.cyan { animation-duration: 15s; background: rgba(6, 182, 212, .4); bottom: 13vh; height: 15rem; left: 5vw; width: 15rem; }
      @keyframes float-orb { from { transform: translateY(0) scale(1); } to { transform: translateY(-20px) scale(1.05); } }
      @keyframes shimmer { from { background-position: 200% center; } to { background-position: -200% center; } }
      @keyframes spin { to { transform: rotate(1turn); } }
      @keyframes enter { to { opacity: 1; transform: translateY(0); } }
      @keyframes pulse { 50% { opacity: .35; transform: scale(.72); } }
      a { color: #22d3ee; text-decoration: none; transition: color .7s var(--ease); }
      a:hover { color: #fff; }
      h1, h2 { font-family: "Instrument Serif", Georgia, serif; font-weight: 400; letter-spacing: -.045em; line-height: .9; margin: 0; }
      h1 { font-size: clamp(3.4rem, 9vw, 7rem); }
      h2 { font-size: clamp(2rem, 4vw, 2.75rem); }
      p { color: var(--muted); font-weight: 300; line-height: 1.7; margin: .75rem 0 0; }
      .nav-pill {
        align-items: center;
        backdrop-filter: blur(16px);
        background: var(--glass);
        border: 1px solid var(--border);
        border-radius: 999px;
        display: grid;
        gap: .75rem;
        grid-template-columns: 1fr auto 1fr;
        left: 50%;
        max-width: 672px;
        padding: .55rem .65rem;
        position: fixed;
        top: 1.5rem;
        transform: translateX(-50%);
        width: 95%;
        z-index: 10;
      }
      .brand { align-items: center; color: #fff; display: inline-flex; font-family: "Instrument Serif", Georgia, serif; font-size: 1.2rem; gap: .5rem; letter-spacing: -.02em; white-space: nowrap; }
      .brand-dot { background: linear-gradient(135deg, var(--violet), var(--cyan)); border-radius: 999px; box-shadow: 0 0 20px -6px var(--violet); height: .45rem; width: .45rem; }
      .nav { display: flex; gap: .75rem; justify-content: center; }
      .nav a { color: #a3a3a3; font-size: .72rem; font-weight: 600; letter-spacing: .18em; text-transform: uppercase; }
      .nav a.active, .nav a:hover { color: #fff; }
      .nav-cta { background: #fff; border-radius: 999px; color: #000; font-size: .78rem; font-weight: 700; justify-self: end; padding: .62rem .95rem; }
      .shell { margin: 0 auto; max-width: 1180px; padding: 7.5rem 1rem 4rem; position: relative; z-index: 1; }
      .login-shell { display: grid; min-height: 100vh; place-items: center; }
      .hero, .panel, .card, form, table {
        backdrop-filter: blur(16px);
        background: rgba(255, 255, 255, .02);
        border: 1px solid var(--border-soft);
        border-radius: 1.5rem;
        box-shadow: 0 0 20px -14px #8b5cf6;
      }
      .hero { background: rgba(8, 8, 8, .8); margin-bottom: 1rem; overflow: hidden; padding: clamp(2rem, 6vw, 3.5rem); position: relative; }
      .hero::after { background: linear-gradient(90deg, rgba(139,92,246,.85), rgba(6,182,212,.75), transparent); bottom: 0; content: ""; height: 1px; left: 0; position: absolute; right: 0; }
      .section-header { align-items: center; display: flex; flex-wrap: wrap; gap: .75rem; justify-content: space-between; }
      .grid { display: grid; gap: 1rem; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
      .eyebrow, .footer-heading { color: #737373; font-size: .62rem; font-weight: 600; letter-spacing: .2em; text-transform: uppercase; }
      .shimmer { animation: shimmer 5s linear infinite; background: linear-gradient(90deg, #a78bfa 0%, #fff 40%, #fff 60%, #22d3ee 100%); background-clip: text; background-size: 200%; color: transparent; }
      .pill { background: rgba(10,10,10,.7); border: 1px solid var(--border); border-radius: 999px; color: #d4d4d4; display: inline-flex; font-size: .7rem; font-weight: 600; letter-spacing: .16em; padding: .4rem .75rem; text-transform: uppercase; }
      .pill.ok { border-color: rgba(16,185,129,.45); color: #6ee7b7; }
      .pill.danger { border-color: rgba(251,113,133,.45); color: #fecdd3; }
      .metric { color: #fff; font-family: Inter, ui-sans-serif, system-ui, sans-serif; font-size: clamp(1.5rem, 4vw, 2.1rem); font-weight: 600; letter-spacing: -.03em; margin-top: .45rem; }
      .muted { color: var(--muted); }
      .mono, pre, code { font-family: ui-monospace, SFMono-Regular, Consolas, monospace; }
      .card, .panel, form { padding: 1.5rem; }
      .card, .panel { opacity: 0; transform: translateY(30px); animation: enter .9s var(--ease) forwards; }
      .card:nth-child(2), .panel:nth-of-type(2) { animation-delay: .18s; }
      .card:hover, .panel:hover { border-color: rgba(139,92,246,.4); box-shadow: 0 0 20px -10px rgba(139,92,246,.4); transform: translateY(-8px); transition: transform .9s var(--ease), border-color .9s var(--ease), box-shadow .9s var(--ease); }
      label { color: #d4d4d4; display: grid; font-size: .72rem; font-weight: 600; gap: .45rem; letter-spacing: .13em; margin: .85rem 0; text-transform: uppercase; }
      input, select, textarea { background: rgba(3,3,3,.88); border: 1px solid var(--border); border-radius: 1rem; color: var(--text); min-height: 3rem; padding: .8rem .9rem; transition: border-color .7s var(--ease), box-shadow .7s var(--ease); width: 100%; }
      input:focus, select:focus, textarea:focus { border-color: rgba(6,182,212,.72); box-shadow: 0 0 0 4px rgba(6,182,212,.12); outline: none; }
      textarea { min-height: 8rem; resize: vertical; }
      button, .button { background: #fff; border: 0; border-radius: 999px; color: #000; cursor: pointer; font-weight: 700; min-height: 3rem; padding: .8rem 1.3rem; transition: transform .7s var(--ease), filter .7s var(--ease); }
      button:hover, .button:hover { filter: brightness(.92); transform: translateY(-2px); }
      .shiny-button { border-radius: 999px; color: #fff; display: inline-grid; font-weight: 700; overflow: hidden; padding: 1px; place-items: center; position: relative; }
      .shiny-button::before { animation: spin 4s linear infinite; background: conic-gradient(from 0deg, transparent 0%, #8b5cf6 40%, #06b6d4 50%, transparent 60%); content: ""; height: 220%; position: absolute; width: 220%; }
      .shiny-button span { background: #0a0a0a; border-radius: 999px; color: #fff; padding: 1rem 2.5rem; position: relative; z-index: 1; }
      .table-wrap { border: 1px solid var(--border-soft); border-radius: 1.5rem; margin-top: 1rem; overflow-x: auto; }
      table { border: 0; border-collapse: collapse; min-width: 720px; width: 100%; }
      th, td { border-bottom: 1px solid var(--border-soft); padding: .86rem; text-align: left; vertical-align: top; }
      th { background: rgba(8,8,8,.82); color: #737373; font-size: .62rem; font-weight: 600; letter-spacing: .2em; text-transform: uppercase; }
      pre { background: rgba(8,8,8,.8); border: 1px solid var(--border); border-radius: 1.25rem; color: #d4d4d4; line-height: 1.7; overflow: auto; padding: 1rem; white-space: pre-wrap; }
      .result { border-color: rgba(16,185,129,.35); box-shadow: 0 0 20px -10px rgba(16,185,129,.45); }
      .login-card { max-width: 500px; width: 100%; }
      .system-status { align-items: center; color: #6ee7b7; display: inline-flex; gap: .5rem; font-size: .78rem; font-weight: 600; }
      .status-dot { animation: pulse 1.8s var(--ease) infinite; background: var(--emerald); border-radius: 999px; box-shadow: 0 0 16px rgba(16,185,129,.7); height: .55rem; width: .55rem; }
      @media (max-width: 760px) { .nav-pill { grid-template-columns: 1fr auto; } .nav { display: none; } h1 { font-size: clamp(3.2rem, 18vw, 5rem); } .shell { padding-top: 7rem; } }
      @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: .001ms !important; animation-iteration-count: 1 !important; scroll-behavior: auto !important; transition-duration: .001ms !important; } }
    </style>
  </head>
  <body>
    <div class="orb violet"></div>
    <div class="orb cyan"></div>
    <header class="nav-pill" aria-label="buyer portal header">
      <a class="brand" href="/buyer-portal/wallet" aria-label="StormLead buyer portal home"><span class="brand-dot"></span><span>StormLead</span></a>
      {% if active_page != 'login' %}
      <nav class="nav" aria-label="buyer portal navigation">
        <a class="{% if active_page == 'wallet' %}active{% endif %}" href="/buyer-portal/wallet">Wallet</a>
        <a class="{% if active_page == 'leads' %}active{% endif %}" href="/buyer-portal/leads">Leads</a>
        <a class="{% if active_page == 'review' %}active{% endif %}" href="/buyer-portal/review">Return</a>
      </nav>
      <a class="nav-cta" href="/buyer-portal/review">Review</a>
      {% else %}
      <nav class="nav" aria-label="buyer portal navigation"><a href="#access">Access</a><a href="#status">Status</a></nav>
      <a class="nav-cta" href="#access">Login</a>
      {% endif %}
    </header>
    <main class="shell {% block shell_class %}{% endblock %}">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
